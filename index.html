<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhishGuard — URL Threat Detector | Sujal</title><link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet"><style>

:root{
--bg:#080c10;
--surface:#0d1117;
--border:#1e2d3d;
--accent:#00ffe0;
--danger:#ff3c5a;
--warn:#ffb627;
--safe:#00e676;
--text:#c9d1d9;
--muted:#4a5568;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Outfit',sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.container{
width:100%;
max-width:850px;
}

header{
text-align:center;
margin-bottom:40px;
}

header h1{
font-size:3rem;
font-weight:800;
}

header h1 span{
color:var(--accent);
}

header p{
color:var(--muted);
margin-top:10px;
}

.scanner-card{
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
padding:30px;
}

.input-row{
display:flex;
gap:10px;
margin-top:10px;
}

input{
flex:1;
padding:15px;
border-radius:10px;
border:1px solid var(--border);
background:var(--bg);
color:white;
font-family:'Share Tech Mono',monospace;
}

button{
padding:15px 25px;
background:var(--accent);
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.result-card{
margin-top:25px;
padding:25px;
border-radius:12px;
border:1px solid;
}

.safe{
background:rgba(0,230,118,0.06);
border-color:rgba(0,230,118,0.4);
}

.warning{
background:rgba(255,182,39,0.06);
border-color:rgba(255,182,39,0.4);
}

.danger{
background:rgba(255,60,90,0.06);
border-color:rgba(255,60,90,0.4);
}

.indicators{
margin-top:15px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:10px;
}

.indicator{
background:var(--bg);
border:1px solid var(--border);
border-radius:10px;
padding:10px;
display:flex;
gap:10px;
font-size:0.85rem;
}

.indicator-dot{
width:10px;
height:10px;
border-radius:50%;
margin-top:5px;
}

.red{background:var(--danger);}
.yellow{background:var(--warn);}
.green{background:var(--safe);}

.loading{
text-align:center;
padding:40px;
}

</style></head><body><div class="container"><header>
<h1>PhishGuard <span>PRO</span></h1>
<p>Advanced Phishing URL Detection Tool</p>
</header><div class="scanner-card"><div class="input-row">
<input id="urlInput" type="text" placeholder="Enter suspicious URL...">
<button id="scanBtn" onclick="analyzeURL()">SCAN</button>
</div><div id="result"></div></div></div><script>

const SUSPICIOUS_TLDS=[
".tk",".ml",".ga",".cf",".gq",".xyz",".top",".click",".loan"
];

const BRAND_SPOOF=[
"paypa1","g00gle","amaz0n","micros0ft","faceb00k"
];

function analyzeURL(){

const input=document.getElementById("urlInput").value.trim();
const result=document.getElementById("result");

if(!input){
result.innerHTML="<div class='result-card warning'>Enter a URL first</div>";
return;
}

result.innerHTML="<div class='loading'>Analyzing...</div>";

setTimeout(()=>{

const analysis=detect(input);
displayResult(input,analysis);

},1000);

}

function detect(url){

let riskScore=0;
const flags=[];
const info=[];

let normalized=url.toLowerCase();

if(!normalized.startsWith("http")){
normalized="http://"+normalized;
}

let parsed;

try{
parsed=new URL(normalized);
}catch{
return{
verdict:"danger",
score:90,
flags:[{color:"red",label:"INVALID URL",detail:"Cannot parse"}],
info:[]
};
}

const hostname=parsed.hostname;

if(parsed.protocol==="http:"){
riskScore+=20;
flags.push({color:"yellow",label:"NO HTTPS",detail:"Connection not encrypted"});
}else{
info.push({color:"green",label:"HTTPS SECURE",detail:"Encrypted connection"});
}

if(/(\d{1,3}\.){3}\d{1,3}/.test(hostname)){
riskScore+=40;
flags.push({color:"red",label:"IP ADDRESS URL",detail:"Uses raw IP"});
}

if(SUSPICIOUS_TLDS.some(t=>hostname.endsWith(t))){
riskScore+=25;
flags.push({color:"red",label:"SUSPICIOUS TLD",detail:"High risk extension"});
}

if(BRAND_SPOOF.some(b=>hostname.includes(b))){
riskScore+=50;
flags.push({color:"red",label:"BRAND SPOOFING",detail:"Fake brand detected"});
}

if(url.length>100){
riskScore+=10;
flags.push({color:"yellow",label:"LONG URL",detail:"Suspiciously long"});
}

riskScore=Math.min(riskScore,100);

let verdict="safe";

if(riskScore>=50) verdict="danger";
else if(riskScore>=20) verdict="warning";

return{verdict,score:riskScore,flags,info};

}

function displayResult(url,analysis){

const{verdict,score,flags,info}=analysis;

const indicators=[...flags,...info].map(f=>`
<div class="indicator">
<div class="indicator-dot ${f.color}"></div>
<div>
<strong>${f.label}</strong><br>
${f.detail}
</div>
</div>
`).join("");

document.getElementById("result").innerHTML=`

<div class="result-card ${verdict}">

<h3>Threat Score: ${score}/100</h3>

<p style="margin-top:6px;font-size:0.85rem;color:#888;">${url}</p>

<div class="indicators">

${indicators||"<p>No threats detected</p>"}

</div>

</div>

`;

}

document.addEventListener("keydown",e=>{
if(e.key==="Enter") analyzeURL();
});

</script></body>
  </html>
