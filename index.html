<script>
  let totalScanned = 0;
  let totalThreats = 0;

  // Detection engine
  const SUSPICIOUS_KEYWORDS = [
    'login', 'signin', 'verify', 'secure', 'account', 'update',
    'banking', 'paypal', 'amazon', 'google', 'microsoft', 'apple',
    'netflix', 'facebook', 'instagram', 'password', 'confirm',
    'wallet', 'crypto', 'bitcoin', 'prize', 'winner', 'free', 'click'
  ];

  const BRAND_SPOOF = [
    'paypa1', 'g00gle', 'amaz0n', 'micros0ft', 'app1e', 'netf1ix',
    'faceb00k', 'lnstagram', 'paypai', 'arnazon', 'miicrosoft'
  ];

  const SUSPICIOUS_TLDS = [
    '.tk', '.ml', '.ga', '.cf', '.gq', '.xyz', '.top', '.click',
    '.loan', '.download', '.accountant', '.stream', '.gdn', '.bid'
  ];

  const TRUSTED_DOMAINS = [
    'google.com', 'gmail.com', 'youtube.com', 'facebook.com',
    'amazon.com', 'microsoft.com', 'apple.com', 'github.com',
    'wikipedia.org', 'reddit.com', 'twitter.com', 'linkedin.com',
    'instagram.com', 'netflix.com', 'paypal.com', 'stackoverflow.com'
  ];

  function analyzeURL() {
    const input = document.getElementById('urlInput').value.trim();
    const resultDiv = document.getElementById('result');

    if (!input) {
      resultDiv.innerHTML = `<div class="result-card warning">
        <div class="verdict-row"><span class="verdict-icon">⚠️</span>
        <span class="verdict-label warning">Please enter a URL</span></div>
      </div>`;
      return;
    }

    // Show loading
    resultDiv.innerHTML = `<div class="loading">
      <div class="spinner"></div>
      <p>ANALYZING THREAT VECTORS...</p>
    </div>`;

    document.getElementById('scanBtn').disabled = true;

    setTimeout(() => {
      const analysis = runDetection(input);
      displayResult(input, analysis);
      document.getElementById('scanBtn').disabled = false;

      totalScanned++;
      document.getElementById('stat-scanned').textContent = totalScanned;
      if (analysis.verdict === 'danger') {
        totalThreats++;
        document.getElementById('stat-threats').textContent = totalThreats;
      }
    }, 1400);
  }

  function runDetection(url) {
    let riskScore = 0;
    const flags = [];
    const info = [];

    // Normalize
    let normalizedURL = url.toLowerCase();
    if (!normalizedURL.startsWith('http')) normalizedURL = 'http://' + normalizedURL;

    let parsed;
    try {
      parsed = new URL(normalizedURL);
    } catch(e) {
      return {
        verdict: 'danger',
        score: 90,
        flags: [{ color: 'red', label: 'INVALID URL', detail: 'Cannot parse URL structure' }],
        info: []
      };
    }

    const hostname = parsed.hostname.toLowerCase();
    const fullURL = normalizedURL;

    // Check trusted domains
    const isTrusted = TRUSTED_DOMAINS.some(d => hostname === d || hostname.endsWith('.' + d));
    if (isTrusted) {
      info.push({ color: 'green', label: 'TRUSTED DOMAIN', detail: 'Known legitimate website' });
    }

    // 1. No HTTPS
    if (parsed.protocol === 'http:') {
      riskScore += 20;
      flags.push({ color: 'yellow', label: 'NO HTTPS', detail: 'Connection is not encrypted' });
    } else {
      info.push({ color: 'green', label: 'HTTPS SECURE', detail: 'Encrypted connection detected' });
    }

    // 2. IP address instead of domain
    if (/^(\d{1,3}\.){3}\d{1,3}$/.test(hostname)) {
      riskScore += 40;
      flags.push({ color: 'red', label: 'IP ADDRESS URL', detail: 'Legitimate sites use domain names' });
    }

    // 3. Suspicious TLD
    const suspTLD = SUSPICIOUS_TLDS.find(tld => hostname.endsWith(tld));
    if (suspTLD) {
      riskScore += 25;
      flags.push({ color: 'red', label: 'SUSPICIOUS TLD', detail: `"${suspTLD}" is commonly used in phishing` });
    }

    // 4. Brand spoofing
    const spoofFound = BRAND_SPOOF.find(s => hostname.includes(s));
    if (spoofFound) {
      riskScore += 50;
      flags.push({ color: 'red', label: 'BRAND SPOOFING', detail: `Fake brand detected: "${spoofFound}"` });
    }

    // 5. Multiple subdomains
    const subdomains = hostname.split('.').length - 2;
    if (subdomains > 2) {
      riskScore += 15;
      flags.push({ color: 'yellow', label: 'EXCESSIVE SUBDOMAINS', detail: `${subdomains} subdomains — unusual for legitimate sites` });
    }

    // 6. Suspicious keywords in URL
    const foundKeywords = SUSPICIOUS_KEYWORDS.filter(kw =>
      fullURL.includes(kw) && !isTrusted
    );
    if (foundKeywords.length >= 2) {
      riskScore += Math.min(foundKeywords.length * 8, 30);
      flags.push({ color: 'yellow', label: 'SUSPICIOUS KEYWORDS', detail: `Found: ${foundKeywords.slice(0,3).join(', ')}` });
    }

    // 7. Very long URL
    if (url.length > 100) {
      riskScore += 15;
      flags.push({ color: 'yellow', label: 'LONG URL', detail: `${url.length} chars — used to hide true destination` });
    }

    // 8. URL contains @ symbol (redirect trick)
    if (url.includes('@')) {
      riskScore += 35;
      flags.push({ color: 'red', label: '@ SYMBOL DETECTED', detail: 'Classic phishing redirect trick' });
    }

    // 9. Double slash in path (redirect)
    if (parsed.pathname.includes('//')) {
      riskScore += 20;
      flags.push({ color: 'red', label: 'DOUBLE SLASH REDIRECT', detail: 'Suspicious path structure' });
    }

    // 10. Punycode/unicode homoglyph attack
    if (url.includes('xn--')) {
      riskScore += 30;
      flags.push({ color: 'red', label: 'PUNYCODE DETECTED', detail: 'Possible homoglyph/lookalike domain attack' });
    }

    // 11. URL shortener
    const shorteners = ['bit.ly', 'tinyurl', 't.co', 'goo.gl', 'ow.ly', 'short.link', 'rb.gy'];
    if (shorteners.some(s => hostname.includes(s))) {
      riskScore += 20;
      flags.push({ color: 'yellow', label: 'URL SHORTENER', detail: 'Hides the real destination URL' });
    }

    // 12. Numbers in domain (typosquatting)
    if (/\d/.test(hostname.replace(/\.\w+$/, '')) && !isTrusted) {
      riskScore += 10;
      flags.push({ color: 'yellow', label: 'NUMBERS IN DOMAIN', detail: 'Possible typosquatting attempt' });
    }

    if (isTrusted) riskScore = Math.max(0, riskScore - 40);
    riskScore = Math.min(riskScore, 100);

    let verdict = 'safe';
    if (riskScore >= 50) verdict = 'danger';
    else if (riskScore >= 20) verdict = 'warning';

    if (flags.length === 0 && verdict === 'safe') {
      info.push({ color: 'green', label: 'NO THREATS FOUND', detail: 'URL appears clean' });
    }

    return { verdict, score: riskScore, flags, info };
  }

  function displayResult(url, analysis) {
    const { verdict, score, flags, info } = analysis;

    const verdictConfig = {
      safe: { icon: '✅', label: 'SAFE', color: 'safe', barClass: 'safe', msg: 'No significant threats detected.' },
      warning: { icon: '⚠️', label: 'SUSPICIOUS', color: 'warning', barClass: 'warning', msg: 'Some red flags found. Proceed with caution.' },
      danger: { icon: '🚨', label: 'PHISHING / DANGER', color: 'danger', barClass: 'danger', msg: 'High threat detected! Do NOT visit this URL.' }
    };

    const vc = verdictConfig[verdict];

    const allIndicators = [...flags, ...info].map(f => `
      <div class="indicator">
        <div class="indicator-dot ${f.color}"></div>
        <div class="indicator-text">
          <strong>${f.label}</strong>
          ${f.detail}
        </div>
      </div>
    `).join('');

    document.getElementById('result').innerHTML = `
      <div class="result-card ${verdict}" style="animation: fadeUp 0.4s ease both; margin-bottom: 32px;">
        <div class="verdict-row">
          <span class="verdict-icon">${vc.icon}</span>
          <span class="verdict-label ${verdict}">${vc.label}</span>
        </div>
        <div class="verdict-url">${url}</div>

        <div class="score-bar-wrap">
          <div class="score-label">
            <span>THREAT SCORE</span>
            <span>${score}/100</span>
          </div>
          <div class="score-bar">
            <div class="score-fill ${vc.barClass}" style="width: 0%" id="scoreFill"></div>
          </div>
        </div>

        <p style="font-size:0.88rem; color: var(--muted); margin-bottom: 20px;">${vc.msg}</p>

        <div class="section-title">// analysis breakdown</div>
        <div class="indicators">${allIndicators || '<div class="indicator"><div class="indicator-dot green"></div><div class="indicator-text"><strong>ALL CLEAR</strong>No suspicious patterns found</div></div>'}</div>
      </div>
    `;

    setTimeout(() => {
      const fill = document.getElementById('scoreFill');
      if (fill) fill.style.width = score + '%';
    }, 50);
  }

  // Enter key support
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('urlInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') analyzeURL();
    });
  });
</script>
